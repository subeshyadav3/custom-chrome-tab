<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>New Tab</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg" />
    <style>
        :root {
            --bg: #020617;
            --bg-card: #0f172a;
            --bg-hover: #1e293b;
            --fg: #e5e7eb;
            --fg-muted: #94a3b8;
            --fg-dim: #64748b;
            --border: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --overlay: rgba(0,0,0,0.6);
            --font: 'JetBrains Mono', monospace;
            --icon-size: 32px;
            --bg-image: none;
            --bg-color: #020617;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            background-image: var(--bg-image);
            background-size: cover;
            background-position: center;
            color: var(--fg);
            font-family: var(--font);
            text-align: center;
            position: relative;
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 6px;
        }

        #greeting-subtitle {
            font-size: 1rem;
            color: var(--fg-muted);
            margin-bottom: 10px;
        }

        #time {
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 20px;
            position: relative;
        }

        #quote {
            max-width: 600px;
            font-size: 1.1rem;
            opacity: 0.85;
            font-style: italic;
        }

        #quick-links {
            margin-top: 40px;
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 750px;
        }

        .tile-wrapper {
            position: relative;
            width: 96px;
            height: 96px;
        }

        .link-card {
            width: 96px;
            height: 96px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--fg);
            transition: transform 0.2s ease, border-color 0.2s ease;
            cursor: pointer;
            box-sizing: border-box;
        }

        .link-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
        }

        .link-card img {
            width: var(--icon-size);
            height: var(--icon-size);
            margin-bottom: 8px;
            border-radius: 6px;
        }

        .link-card span {
            font-size: 0.7rem;
            opacity: 0.9;
            max-width: 84px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .menu-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 22px;
            height: 22px;
            border: none;
            background: rgba(15, 23, 42, 0.8);
            color: var(--fg-muted);
            border-radius: 50%;
            font-size: 14px;
            line-height: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            z-index: 2;
        }

        .tile-wrapper:hover .menu-btn {
            opacity: 1;
        }

        .menu-btn:hover {
            background: var(--bg-hover);
            color: var(--fg);
        }

        .menu-dropdown {
            position: absolute;
            top: 24px;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 4px 0;
            min-width: 100px;
            display: none;
            z-index: 10;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .menu-dropdown.show {
            display: block;
        }

        .menu-dropdown button {
            display: block;
            width: 100%;
            padding: 8px 14px;
            border: none;
            background: none;
            color: var(--fg);
            font-family: inherit;
            font-size: 0.8rem;
            text-align: left;
            cursor: pointer;
        }

        .menu-dropdown button:hover {
            background: var(--bg-hover);
        }

        .menu-dropdown .remove-btn {
            color: #ef4444;
        }

        #add-shortcut {
            width: 96px;
            height: 96px;
            background: var(--bg-card);
            border: 1px dashed var(--border);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--fg-muted);
            font-family: inherit;
            font-size: 0.7rem;
            transition: border-color 0.2s, color 0.2s;
            gap: 6px;
        }

        #add-shortcut:hover {
            border-color: var(--accent);
            color: var(--fg);
        }

        #add-shortcut .plus {
            font-size: 24px;
            line-height: 1;
        }

        #overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 50;
        }

        #overlay.show {
            display: block;
        }

        #bg-video-container {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }
        #bg-video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #dialog {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            z-index: 60;
            width: 320px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }

        #dialog.show {
            display: block;
        }

        #dialog h2 {
            margin: 0 0 16px;
            font-size: 1.1rem;
        }

        #dialog label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            color: var(--fg-muted);
            margin-bottom: 4px;
        }

        #dialog input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.9rem;
            box-sizing: border-box;
            outline: none;
        }

        #dialog input:focus {
            border-color: var(--accent);
        }

        .dialog-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .dialog-actions button {
            padding: 8px 18px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .dialog-actions button:hover {
            border-color: var(--accent);
        }

        .dialog-actions .primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .dialog-actions .primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
        }

        #google-search {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        #search-form {
            display: flex;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        #search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            font-size: 1rem;
            outline: none;
        }

        #search-form button {
            padding: 0 16px;
            border: none;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.2s ease;
        }

        #search-form button:hover {
            background: var(--accent-hover);
        }

        #suggestions {
            list-style: none;
            margin: 5px 0 0 0;
            padding: 0;
            width: 100%;
            background: var(--bg-card);
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }

        #suggestions li {
            padding: 8px 12px;
            cursor: pointer;
            color: var(--fg);
        }

        #suggestions li:hover {
            background: var(--bg-hover);
        }

        #top-bar {
            position: fixed;
            top: 16px;
            right: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #top-bar a {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--fg-muted);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: 20px;
            transition: all 0.2s;
            background: none;
            font-family: inherit;
            cursor: pointer;
        }

        #top-bar a:hover {
            border-color: var(--accent);
            color: var(--fg);
        }

        #top-bar img {
            width: 22px;
            height: 22px;
            border-radius: 50%;
        }

        #settings-btn {
            position: fixed;
            left: 20px;
            bottom: 20px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--bg-card);
            color: var(--fg-muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }

        #settings-btn:hover {
            border-color: var(--accent);
            color: var(--fg);
            background: var(--accent);
            color: #fff;
        }

        #add-topbar-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border: 1px solid #1e293b;
            border-radius: 50%;
            background: transparent;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            padding: 0;
            line-height: 1;
        }

        #add-topbar-btn:hover {
            border-color: #3b82f6;
            color: #e5e7eb;
            background: rgba(59, 130, 246, 0.1);
        }

        .add-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 12px 16px;
            min-width: 360px;
            max-height: 420px;
            overflow-y: auto;
            display: none;
            z-index: 200;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .add-menu.show {
            display: block;
        }

        .add-menu-category {
            font-size: 0.65rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0 4px;
            padding: 0 4px;
        }

        .add-menu-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }

        .add-menu-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            color: #e5e7eb;
            transition: background 0.15s;
        }

        .add-menu-item:hover {
            background: #1e293b;
        }

        .add-menu-item img {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        .add-menu-item.added {
            opacity: 0.3;
            pointer-events: none;
        }

        .top-bar-account {
            margin-left: auto;
        }

        #top-bar a[draggable="true"] {
            cursor: grab;
        }

        #top-bar a.dragging {
            opacity: 0.4;
        }

        #top-bar a.drag-over {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.15);
        }

        /* ─── Widgets ─── */
        .widget {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--fg-muted);
            min-width: 120px;
            text-align: center;
        }

        #widget-date {
            position: fixed;
            left: 20px;
            bottom: 64px;
            z-index: 30;
        }

        #widget-weather {
            margin-top: 8px;
            position: relative;
        }

        #widget-todo {
            position: fixed;
            left: 20px;
            top: 64px;
            width: 220px;
            max-height: 380px;
            overflow-y: auto;
            text-align: left;
            z-index: 30;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--fg-muted);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        #widget-todo::-webkit-scrollbar { width: 4px; }
        #widget-todo::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        #widget-todo .todo-input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.8rem;
            box-sizing: border-box;
            outline: none;
            margin-bottom: 8px;
        }

        #widget-todo .todo-input:focus {
            border-color: var(--accent);
        }

        #widget-todo .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #widget-todo .todo-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 0;
            font-size: 0.8rem;
        }

        #widget-todo .todo-item.done span {
            text-decoration: line-through;
            opacity: 0.5;
        }

        #widget-todo .todo-item input[type="checkbox"] {
            accent-color: var(--accent);
        }

        #widget-todo .todo-item span {
            flex: 1;
            color: var(--fg);
        }

        #widget-todo .todo-del {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 2px;
        }

        #widget-todo .todo-count {
            font-size: 0.7rem;
            color: var(--fg-dim);
            margin-top: 4px;
            text-align: right;
        }

        #widget-todo .todo-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fg-dim);
            margin-bottom: 8px;
        }

        #widget-pomo {
            position: fixed;
            right: 20px;
            top: 64px;
            z-index: 30;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--fg-muted);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        #widget-pomo .pomo-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fg-dim);
        }

        #widget-pomo .pomo-timer {
            font-size: 1.8rem;
            color: var(--fg);
            font-weight: bold;
            margin: 4px 0;
        }

        #widget-pomo .pomo-controls {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        #widget-pomo .pomo-controls button {
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
        }

        #widget-pomo .pomo-controls button:hover {
            border-color: var(--accent);
        }

        .drag-handle {
            user-select: none;
            transition: opacity 0.2s;
        }

        .drag-handle.hamburger {
            position: absolute;
            top: 4px;
            right: 4px;
            cursor: grab;
            opacity: 0.3;
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--fg-muted);
            z-index: 5;
            line-height: 1;
        }
        .drag-handle.hamburger:hover {
            opacity: 1;
        }

        .move-mode {
            outline: 2px dashed var(--accent) !important;
            outline-offset: 2px;
            cursor: move !important;
        }

        .dragging {
            opacity: 0.85;
            z-index: 9999 !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ─── Settings Panel ─── */
        #settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 200;
        }
        #settings-overlay.show { display: block; }

        #settings-panel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            z-index: 210;
            width: 560px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }
        #settings-panel.show { display: block; }

        #settings-panel::-webkit-scrollbar { width: 6px; }
        #settings-panel::-webkit-scrollbar-track { background: transparent; }
        #settings-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .settings-header h2 {
            margin: 0;
            font-size: 1.2rem;
        }

        .settings-header button {
            background: none;
            border: 1px solid var(--border);
            color: var(--fg-muted);
            border-radius: 8px;
            padding: 4px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
        }

        .settings-header button:hover {
            border-color: var(--accent);
            color: var(--fg);
        }

        .settings-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin: 16px 0 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: 0.85rem;
        }

        .settings-label {
            min-width: 100px;
            color: var(--fg-muted);
            font-size: 0.8rem;
        }

        .set-btn {
            padding: 4px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .set-btn.active {
            border-color: var(--accent);
            background: var(--accent);
            color: #fff;
        }

        .set-btn:hover {
            border-color: var(--accent);
        }

        .set-btn.reset {
            color: #ef4444;
            border-color: #ef4444;
        }

        .set-btn.reset:hover {
            background: #ef4444;
            color: #fff;
        }

        .set-select {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
        }

        .set-select:focus {
            border-color: var(--accent);
        }

        .set-input {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--bg);
            color: var(--fg);
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
        }

        .set-input:focus {
            border-color: var(--accent);
        }

        .set-color {
            width: 36px;
            height: 36px;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 2px;
            background: var(--bg);
            cursor: pointer;
        }

        .set-cb {
            accent-color: var(--accent);
        }

        .set-textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--fg);
            font-family: monospace;
            font-size: 0.8rem;
            resize: vertical;
            box-sizing: border-box;
            outline: none;
        }

        .set-textarea:focus {
            border-color: var(--accent);
        }

        .settings-btn-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .bg-preview {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-left: auto;
        }

        /* ─── Background Gallery ─── */
        .bg-gallery {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--overlay);
            z-index: 300;
            align-items: center;
            justify-content: center;
        }
        .bg-gallery.show { display: flex; }

        .bg-gallery-panel {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px 24px;
            width: 560px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 16px 48px rgba(0,0,0,0.5);
        }

        .bg-gallery-panel::-webkit-scrollbar { width: 6px; }
        .bg-gallery-panel::-webkit-scrollbar-track { background: transparent; }
        .bg-gallery-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .bg-gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .bg-gallery-header h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        .bg-gallery-header button {
            background: none;
            border: 1px solid var(--border);
            color: var(--fg-muted);
            border-radius: 8px;
            padding: 4px 12px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
        }

        .bg-gallery-header button:hover {
            border-color: var(--accent);
            color: var(--fg);
        }

        .bg-gallery-section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--accent);
            margin: 12px 0 8px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        .bg-gallery-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
        }

        .bg-gallery-swatch {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 2px solid var(--border);
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s, transform 0.15s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4px;
        }

        .bg-gallery-swatch:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .bg-gallery-swatch.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent);
        }

        .bg-gallery-label {
            font-size: 0.6rem;
            color: rgba(255,255,255,0.8);
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            pointer-events: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }

        .bg-gallery-custom {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-top: 4px;
        }

        .bg-gallery-custom .set-input {
            flex: 1;
        }
    </style>
</head>

<body>

    <div id="top-bar"></div>

    <h1 id="greeting"></h1>
    <p id="greeting-subtitle"></p>
    <div id="time"></div>
    <div id="quote"></div>

    <div id="google-search">
        <form id="search-form" method="GET" target="_self">
            <input type="text" id="search-input" placeholder="Search..." autocomplete="off" />
            <button type="submit">&#x1F50D;</button>
        </form>
        <ul id="suggestions"></ul>
    </div>

    <div id="widget-date" class="widget" style="display:none"></div>
    <div id="widget-weather" class="widget" style="display:none"></div>
    <div id="widget-todo" style="display:none">
        <div class="todo-label">Tasks</div>
        <input class="todo-input" placeholder="Add todo... (press Enter)" />
        <ul class="todo-list"></ul>
        <div class="todo-count"></div>
    </div>
    <div id="widget-pomo" style="display:none">
        <div class="pomo-label">Focus</div>
        <div class="pomo-timer">25:00</div>
        <div class="pomo-controls">
            <button class="pomo-btn">Start</button>
            <button class="pomo-reset">Reset</button>
        </div>
    </div>

    <div id="quick-links"></div>

    <div id="overlay"></div>

    <div id="settings-overlay"></div>

    <div id="settings-panel">
        <div class="settings-header">
            <h2>&#x2699; Settings</h2>
            <button id="settings-close-btn">&#x2715;</button>
        </div>
        <div id="settings-form"></div>
    </div>

    <div id="dialog">
        <h2 id="dialog-title">Add shortcut</h2>
        <label for="dialog-name">Name</label>
        <input id="dialog-name" type="text" placeholder="Shortcut name" />
        <label for="dialog-url">URL</label>
        <input id="dialog-url" type="url" placeholder="https://example.com" />
        <div class="dialog-actions">
            <button id="dialog-cancel">Cancel</button>
            <button id="dialog-done" class="primary">Done</button>
        </div>
    </div>

    <button id="settings-btn">&#x2699; Settings</button>

    <script src="env-config.js"></script>
    <script src="settings.js"></script>
    <script src="script.js"></script>
</body>

</html>
